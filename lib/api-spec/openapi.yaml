openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: claude
    description: Claude Vision OCR
  - name: gemini
    description: Google Gemini Vision OCR (user-supplied API key)
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /claude:
    post:
      operationId: claudeOcr
      tags: [claude]
      summary: Extract ingredients from product label image
      description: Accepts a base64-encoded image and returns extracted ingredients text via Claude Vision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClaudeOcrInput"
      responses:
        "200":
          description: Extracted ingredients text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClaudeOcrResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /gemini:
    post:
      operationId: geminiOcr
      tags: [gemini]
      summary: Extract ingredients using Google Gemini Vision (user-supplied API key)
      description: Accepts a base64-encoded image and a user-provided Google API key, returns extracted ingredients text via Gemini Vision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GeminiOcrInput"
      responses:
        "200":
          description: Extracted ingredients text
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeminiOcrResult"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Upstream API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    GeminiOcrInput:
      type: object
      required:
        - imageBase64
        - googleApiKey
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data
        mediaType:
          type: string
          description: MIME type of the image (default image/jpeg)
        googleApiKey:
          type: string
          description: User-provided Google AI API key
    GeminiOcrResult:
      type: object
      required:
        - ingredientsText
      properties:
        ingredientsText:
          type: string
          description: Comma-separated ingredients extracted from the image
    ClaudeOcrInput:
      type: object
      required:
        - imageBase64
      properties:
        imageBase64:
          type: string
          description: Base64-encoded image data
    ClaudeOcrResult:
      type: object
      required:
        - ingredientsText
      properties:
        ingredientsText:
          type: string
          description: Comma-separated ingredients extracted from the image
    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        detail:
          type: string
